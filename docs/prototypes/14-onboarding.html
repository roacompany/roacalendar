<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로아 캘린더 — 온보딩</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB;
    --accent: #F97316;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --text: #1C1C1A;
    --text-secondary: #525250;
    --text-muted: #A3A3A0;
    --border: #E5E5E0;
    --border-light: #F5F5F3;
    --success: #22C55E;
    --error: #EF4444;
    --info: #3B82F6;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --font: 'Pretendard Variable', -apple-system, system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #191F28; --surface: #242B35; --text: #F5F5F3;
    --text-secondary: #A3A3A0; --text-muted: #737370;
    --border: #333B48; --border-light: #2A3140;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); background: #E8E8E8;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 24px 0;
    transition: background 0.2s;
  }
  [data-theme="dark"] body { background: #111; }

  .phone {
    width: 375px;
    min-height: 812px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    transition: background 0.2s;
  }

  .theme-toggle {
    position: fixed; top: 12px; right: 12px; z-index: 200;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 15px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    box-shadow: var(--shadow-md);
  }

  /* Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 6px; font-size: 12px; font-weight: 600;
    color: var(--text); flex-shrink: 0;
  }

  /* Step label */
  .step-label {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 8px 0 4px;
    flex-shrink: 0;
  }

  /* Horizontal scroll container */
  .scroll-container {
    flex: 1;
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .scroll-container::-webkit-scrollbar { display: none; }

  /* Each screen */
  .screen {
    min-width: 375px;
    width: 375px;
    height: 100%;
    flex-shrink: 0;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    padding: 0 28px 32px;
    position: relative;
  }

  /* Step indicator */
  .step-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 12px 0 0;
    flex-shrink: 0;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border);
    transition: all 0.2s;
  }
  .dot.active {
    width: 20px;
    border-radius: 3px;
    background: var(--primary);
  }

  /* ===================== SCREEN 1: WELCOME ===================== */
  .welcome-screen {
    justify-content: center;
    align-items: center;
    gap: 0;
  }
  .app-icon-area {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, var(--primary), #1D4ED8);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    margin-bottom: 32px;
    box-shadow: 0 12px 32px rgba(37,99,235,0.3);
  }
  .welcome-title {
    font-size: 34px; font-weight: 800; letter-spacing: -1px;
    color: var(--text); margin-bottom: 10px; text-align: center;
  }
  .welcome-subtitle {
    font-size: 17px; color: var(--text-secondary);
    text-align: center; margin-bottom: 56px;
    font-weight: 400;
  }
  .btn-primary {
    width: 100%; padding: 17px;
    background: var(--primary); color: white;
    border: none; border-radius: var(--radius-lg);
    font-size: 17px; font-weight: 700;
    font-family: var(--font);
    cursor: pointer; letter-spacing: -0.2px;
    transition: opacity 0.15s, transform 0.15s;
    box-shadow: 0 4px 16px rgba(37,99,235,0.28);
  }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

  /* ===================== SCREEN 2–5: FEATURE CARDS ===================== */
  .feature-screen {
    justify-content: space-between;
    padding-top: 0;
  }
  .skip-btn {
    align-self: flex-end;
    font-size: 14px; font-weight: 600;
    color: var(--text-muted);
    background: none; border: none;
    font-family: var(--font);
    cursor: pointer; padding: 4px 0;
  }
  .feature-illustration {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .feature-emoji-bg {
    width: 130px; height: 130px;
    border-radius: 40px;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px;
    margin-bottom: 8px;
  }
  .feature-emoji-bg.blue { background: rgba(37,99,235,0.1); }
  .feature-emoji-bg.orange { background: rgba(249,115,22,0.1); }
  .feature-emoji-bg.green { background: rgba(34,197,94,0.1); }
  .feature-emoji-bg.purple { background: rgba(168,85,247,0.1); }
  .feature-title {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    color: var(--text); text-align: center;
  }
  .feature-desc {
    font-size: 16px; color: var(--text-secondary);
    text-align: center; font-weight: 400; line-height: 1.5;
  }
  .page-dots {
    display: flex; justify-content: center; gap: 6px;
    padding-bottom: 8px;
  }

  /* ===================== SCREEN 5: SETTINGS ===================== */
  .settings-screen {
    justify-content: flex-start;
    gap: 0;
    overflow-y: auto;
  }
  .settings-screen::-webkit-scrollbar { display: none; }
  .onb-title {
    font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
    margin-bottom: 6px; color: var(--text);
  }
  .onb-subtitle {
    font-size: 14px; color: var(--text-muted);
    margin-bottom: 28px;
  }
  .settings-group {
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid var(--border-light);
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-light);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-label {
    font-size: 15px; font-weight: 500; color: var(--text);
  }
  .settings-value {
    font-size: 14px; color: var(--text-muted);
  }
  .toggle-group {
    display: flex; gap: 1px;
    background: var(--border-light); border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .toggle-opt {
    padding: 6px 12px;
    font-size: 13px; font-weight: 600;
    color: var(--text-muted); background: transparent;
    border: none; font-family: var(--font); cursor: pointer;
    transition: all 0.15s;
  }
  .toggle-opt.active {
    background: var(--primary); color: white;
    border-radius: var(--radius-sm);
  }
  .time-display {
    font-size: 22px; font-weight: 700;
    color: var(--primary); font-variant-numeric: tabular-nums;
  }
  .preset-chips {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 16px;
  }
  .preset-chip {
    padding: 7px 14px;
    border-radius: var(--radius-full);
    font-size: 13px; font-weight: 600;
    background: var(--border-light); color: var(--text-secondary);
    border: 1.5px solid transparent;
    cursor: pointer; transition: all 0.15s;
  }
  .preset-chip.selected {
    background: rgba(37,99,235,0.1);
    color: var(--primary);
    border-color: var(--primary);
  }
  .btn-ghost {
    width: 100%; padding: 15px;
    background: transparent; color: var(--text-muted);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    font-size: 15px; font-weight: 600;
    font-family: var(--font);
    cursor: pointer; margin-bottom: 10px;
    transition: opacity 0.15s;
  }
  .btn-ghost:active { opacity: 0.7; }

  /* ===================== SCREEN 6: COMPLETE ===================== */
  .complete-screen {
    justify-content: center;
    align-items: center;
    gap: 0;
  }
  .complete-icon-area {
    width: 120px; height: 120px;
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
    border-radius: 60px;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px;
    margin-bottom: 28px;
    box-shadow: 0 0 0 16px rgba(34,197,94,0.06);
  }
  .complete-title {
    font-size: 32px; font-weight: 800; letter-spacing: -0.5px;
    color: var(--text); margin-bottom: 10px; text-align: center;
  }
  .complete-subtitle {
    font-size: 16px; color: var(--text-secondary);
    text-align: center; margin-bottom: 52px;
    font-weight: 400; line-height: 1.5;
  }
  .btn-primary-lg {
    width: 100%; padding: 19px;
    background: var(--primary); color: white;
    border: none; border-radius: var(--radius-lg);
    font-size: 18px; font-weight: 800;
    font-family: var(--font);
    cursor: pointer; letter-spacing: -0.3px;
    transition: opacity 0.15s, transform 0.15s;
    box-shadow: 0 6px 20px rgba(37,99,235,0.32);
  }
  .btn-primary-lg:active { opacity: 0.85; transform: scale(0.98); }

  /* Bottom step indicator strip */
  .bottom-indicator {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    padding: 10px 0 18px;
    background: var(--bg);
    border-top: 1px solid var(--border-light);
  }
  .ind-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }
  .ind-dot.active {
    width: 22px; border-radius: 3px;
    background: var(--primary);
  }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="phone" id="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <span style="font-size:10px;">●●●&nbsp;&nbsp;📶&nbsp;&nbsp;🔋</span>
  </div>

  <!-- Step label -->
  <div class="step-label" id="stepLabel">1 / 6</div>

  <!-- Horizontal scroll -->
  <div class="scroll-container" id="scrollContainer">

    <!-- ===== SCREEN 1: WELCOME ===== -->
    <div class="screen welcome-screen">
      <div class="app-icon-area">📅</div>
      <div class="welcome-title">로아 캘린더</div>
      <div class="welcome-subtitle">일정을 정리하세요</div>
      <button class="btn-primary" onclick="goToStep(1)">시작하기</button>
    </div>

    <!-- ===== SCREEN 2: CALENDAR ===== -->
    <div class="screen feature-screen">
      <button class="skip-btn" onclick="goToStep(5)">건너뛰기</button>
      <div class="feature-illustration">
        <div class="feature-emoji-bg blue">📅</div>
        <div class="feature-title">캘린더</div>
        <div class="feature-desc">구글 캘린더 수준의 일정 관리</div>
      </div>
      <div class="page-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <button class="btn-primary" onclick="goToStep(2)">다음</button>
    </div>

    <!-- ===== SCREEN 3: POMODORO ===== -->
    <div class="screen feature-screen">
      <button class="skip-btn" onclick="goToStep(5)">건너뛰기</button>
      <div class="feature-illustration">
        <div class="feature-emoji-bg orange">🍅</div>
        <div class="feature-title">집중</div>
        <div class="feature-desc">뽀모도로 타이머로 생산성 향상</div>
      </div>
      <div class="page-dots">
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <button class="btn-primary" onclick="goToStep(3)">다음</button>
    </div>

    <!-- ===== SCREEN 4: TODO ===== -->
    <div class="screen feature-screen">
      <button class="skip-btn" onclick="goToStep(5)">건너뛰기</button>
      <div class="feature-illustration">
        <div class="feature-emoji-bg green">☑️</div>
        <div class="feature-title">할 일</div>
        <div class="feature-desc">3가지 날짜 시스템으로 체계적 관리</div>
      </div>
      <div class="page-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>
      <button class="btn-primary" onclick="goToStep(4)">다음</button>
    </div>

    <!-- ===== SCREEN 5: SELF MANAGE ===== -->
    <div class="screen feature-screen">
      <button class="skip-btn" onclick="goToStep(5)">건너뛰기</button>
      <div class="feature-illustration">
        <div class="feature-emoji-bg purple">📊</div>
        <div class="feature-title">자기관리</div>
        <div class="feature-desc">통계, 리뷰, 목표로 성장 추적</div>
      </div>
      <div class="page-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
      </div>
      <button class="btn-primary" onclick="goToStep(5)">다음</button>
    </div>

    <!-- ===== SCREEN 6: SETTINGS ===== -->
    <div class="screen settings-screen">
      <div style="padding-top:4px;">
        <div class="onb-title">기본 설정</div>
        <div class="onb-subtitle">나중에 설정에서 변경할 수 있어요</div>
      </div>

      <!-- First day of week -->
      <div class="settings-group">
        <div class="settings-row">
          <span class="settings-label">첫 요일</span>
          <div class="toggle-group">
            <button class="toggle-opt active">월요일</button>
            <button class="toggle-opt">일요일</button>
          </div>
        </div>
      </div>

      <!-- Off time -->
      <div class="settings-group">
        <div class="settings-row">
          <span class="settings-label">퇴근 시간</span>
          <span class="time-display">오후 6시</span>
        </div>
      </div>

      <!-- Presets -->
      <div class="settings-group">
        <div class="settings-row" style="border-bottom:1px solid var(--border-light); padding-bottom:10px;">
          <span class="settings-label">기본 프리셋</span>
        </div>
        <div class="preset-chips">
          <div class="preset-chip selected">클래식</div>
          <div class="preset-chip">딥워크</div>
          <div class="preset-chip">단거리</div>
          <div class="preset-chip">릴렉스</div>
          <div class="preset-chip">울트라</div>
          <div class="preset-chip">커스텀</div>
        </div>
      </div>

      <button class="btn-ghost" onclick="goToStep(6)">나중에 설정할게요</button>
      <button class="btn-primary" onclick="goToStep(6)">다음</button>
    </div>

    <!-- ===== SCREEN 7: COMPLETE ===== -->
    <div class="screen complete-screen">
      <div class="complete-icon-area">✅</div>
      <div class="complete-title">준비 완료!</div>
      <div class="complete-subtitle">로아 캘린더를 시작하세요</div>
      <button class="btn-primary-lg">시작</button>
    </div>

  </div><!-- /scroll-container -->

  <!-- Bottom step indicator -->
  <div class="bottom-indicator">
    <div class="ind-dot active" id="ind0"></div>
    <div class="ind-dot" id="ind1"></div>
    <div class="ind-dot" id="ind2"></div>
    <div class="ind-dot" id="ind3"></div>
    <div class="ind-dot" id="ind4"></div>
    <div class="ind-dot" id="ind5"></div>
    <div class="ind-dot" id="ind6"></div>
  </div>
</div><!-- /phone -->

<script>
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.textContent = '🌙';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  }
}

const container = document.getElementById('scrollContainer');
const stepLabel = document.getElementById('stepLabel');
const totalSteps = 7;

function goToStep(idx) {
  container.scrollTo({ left: idx * 375, behavior: 'smooth' });
}

function updateIndicators(idx) {
  stepLabel.textContent = (idx + 1) + ' / ' + totalSteps;
  for (let i = 0; i < totalSteps; i++) {
    const dot = document.getElementById('ind' + i);
    if (dot) {
      dot.classList.toggle('active', i === idx);
    }
  }
}

container.addEventListener('scroll', () => {
  const idx = Math.round(container.scrollLeft / 375);
  updateIndicators(idx);
});

// Init
updateIndicators(0);
</script>
</body>
</html>
