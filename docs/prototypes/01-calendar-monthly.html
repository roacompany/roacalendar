<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로아 캘린더 — 월간 뷰</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB;
    --accent: #F97316;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --text: #1C1C1A;
    --text-secondary: #525250;
    --text-muted: #A3A3A0;
    --border: #E5E5E0;
    --border-light: #F5F5F3;
    --success: #22C55E;
    --error: #EF4444;
    --info: #3B82F6;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --font: 'Pretendard Variable', -apple-system, system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #191F28; --surface: #242B35; --text: #F5F5F3;
    --text-secondary: #A3A3A0; --text-muted: #737370;
    --border: #333B48; --border-light: #2A3140;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    width: 375px; margin: 0 auto; min-height: 812px;
    display: flex; flex-direction: column;
    transition: background 0.2s, color 0.2s;
  }
  .theme-toggle {
    position: fixed; top: 8px; right: 8px; z-index: 100;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 14px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }

  /* Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px 4px; font-size: 12px; font-weight: 600;
  }

  /* Header */
  .header {
    padding: 8px 16px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header-left { display: flex; align-items: baseline; gap: 8px; }
  .month-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .year-title { font-size: 15px; font-weight: 500; color: var(--text-secondary); }
  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }
  .today-btn {
    padding: 6px 14px; border-radius: var(--radius-full);
    background: var(--primary); color: white;
    font-size: 12px; font-weight: 600; border: none; cursor: pointer;
  }

  /* View Switcher */
  .view-switcher {
    display: flex; gap: 4px; padding: 0 16px 12px;
  }
  .view-tab {
    padding: 6px 14px; border-radius: var(--radius-full);
    font-size: 13px; font-weight: 600; border: none; cursor: pointer;
    background: transparent; color: var(--text-muted);
    transition: all 0.2s;
  }
  .view-tab.active {
    background: var(--primary); color: white;
  }

  /* Calendar Grid */
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    padding: 0 12px; text-align: center;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    padding-bottom: 8px;
  }
  .cal-weekdays .sat { color: var(--info); }
  .cal-weekdays .sun { color: var(--error); }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    padding: 0 8px; gap: 1px;
  }
  .cal-cell {
    aspect-ratio: 1 / 1.1;
    display: flex; flex-direction: column;
    align-items: center; padding: 4px 2px;
    border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.15s;
    position: relative;
  }
  .cal-cell:active { background: var(--border-light); }
  .cal-num {
    font-size: 14px; font-weight: 500;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-cell.today .cal-num {
    background: var(--primary); color: white; font-weight: 700;
  }
  .cal-cell.other .cal-num { color: var(--text-muted); opacity: 0.4; }
  .cal-cell.sat .cal-num { color: var(--info); }
  .cal-cell.sun .cal-num { color: var(--error); }
  .cal-cell.holiday .cal-num { color: var(--error); }
  .cal-cell.today.sat .cal-num,
  .cal-cell.today.sun .cal-num { color: white; }

  .cal-events {
    display: flex; flex-direction: column; gap: 2px;
    width: 100%; padding: 0 2px; margin-top: 2px;
  }
  .cal-event-bar {
    height: 4px; border-radius: 2px; width: 100%;
  }
  .cal-event-dot {
    width: 4px; height: 4px; border-radius: 50%;
    margin: 0 auto;
  }
  .cal-more {
    font-size: 9px; color: var(--text-muted); font-weight: 600;
    text-align: center;
  }

  /* Divider */
  .section-divider {
    height: 1px; background: var(--border-light);
    margin: 0 16px;
  }

  /* Day Detail */
  .day-detail {
    flex: 1; padding: 12px 16px;
    overflow-y: auto;
  }
  .day-detail-header {
    font-size: 15px; font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .day-detail-date { color: var(--primary); }

  .event-list { display: flex; flex-direction: column; gap: 8px; }
  .event-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border-radius: var(--radius-md);
    border-left: 3px solid var(--primary);
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s;
  }
  .event-item:active { transform: scale(0.98); }
  .event-item.orange { border-left-color: var(--accent); }
  .event-item.green { border-left-color: var(--success); }
  .event-item.red { border-left-color: var(--error); }
  .event-time {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    min-width: 44px; font-variant-numeric: tabular-nums;
    font-family: -apple-system, system-ui, sans-serif;
  }
  .event-info { flex: 1; }
  .event-title { font-size: 14px; font-weight: 500; }
  .event-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .event-chip {
    padding: 2px 8px; border-radius: var(--radius-full);
    font-size: 10px; font-weight: 600;
  }

  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
  }
  .task-check {
    width: 20px; height: 20px; min-width: 20px;
    border: 2px solid var(--border); border-radius: 50%;
  }
  .task-check.done { background: var(--success); border-color: var(--success); }
  .task-title { font-size: 14px; font-weight: 500; flex: 1; }
  .task-due { font-size: 11px; font-weight: 600; color: var(--error); }

  .empty-state {
    text-align: center; padding: 32px 0;
    color: var(--text-muted); font-size: 14px;
  }

  /* FAB */
  .fab {
    position: fixed; bottom: 72px; right: calc((100vw - 375px)/2 + 20px);
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--primary); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 300; border: none;
    box-shadow: var(--shadow-md); cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:active { transform: scale(0.92); }

  /* Tab Bar */
  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 375px;
    display: flex; justify-content: space-around; align-items: center;
    padding: 6px 0 20px;
    background: var(--surface);
    border-top: 1px solid var(--border-light);
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10px; font-weight: 500; color: var(--text-muted);
    cursor: pointer; padding: 4px 8px;
    transition: color 0.2s;
  }
  .tab-item.active { color: var(--primary); }
  .tab-icon { font-size: 22px; }
  .tab-badge {
    position: absolute; top: -2px; right: -4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--error);
  }
  .tab-item { position: relative; }

  /* Bottom padding for tab bar */
  .bottom-spacer { height: 68px; }

  /* Holiday label */
  .holiday-label {
    font-size: 8px; color: var(--error); font-weight: 600;
    margin-top: 1px; line-height: 1;
  }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<!-- Status Bar -->
<div class="status-bar">
  <span>9:41</span>
  <span style="font-size:10px;">●●●&nbsp;&nbsp;📶&nbsp;&nbsp;🔋</span>
</div>

<!-- Header -->
<div class="header">

  <!-- Week 3 -->
  <div class="cal-cell"><span class="cal-num">9</span></div>
  <div class="cal-cell">
    <span class="cal-num">10</span>

      <div class="cal-event-bar" style="background:var(--primary);"></div>

  </div>
  <div class="cal-cell"><span class="cal-num">11</span></div>

      <div class="cal-event-bar" style="background:var(--accent);"></div>

      <div class="cal-event-bar" style="background:var(--primary);"></div>

  </div>
  <div class="cal-cell"><span class="cal-num">18</span></div>
  <div class="cal-cell"><span class="cal-num">19</span></div>

  <!-- Week 5 -->
  <div class="cal-cell">

  </div>
  <div class="cal-cell"><span class="cal-num">24</span></div>
  <div class="cal-cell"><span class="cal-num">25</span></div>
  <div class="cal-cell today">
    <span class="cal-num">26</span>
    <div class="cal-events">
      <div class="cal-event-bar" style="background:var(--primary);"></div>
      <div class="cal-event-bar" style="background:var(--accent);"></div>

  <div class="cal-cell"><span class="cal-num">27</span></div>
  <div class="cal-cell sat"><span class="cal-num">28</span></div>

  <!-- Week 6 -->

  <div class="cal-cell other sat"><span class="cal-num">4</span></div>
  <div class="cal-cell other sun"><span class="cal-num">5</span></div>
</div>

<div class="section-divider" style="margin-top:8px;"></div>

<!-- Day Detail -->
<div class="day-detail">
  <div class="day-detail-header">
    <span class="day-detail-date">26일</span>
    <span>수요일 · 오늘</span>
  </div>

  <div class="event-list">
    <div class="event-item">
      <span class="event-time">10:00</span>
      <div class="event-info">

      </div>

    <div class="event-item orange">
      <span class="event-time">14:00</span>
      <div class="event-info">

        <div class="event-subtitle">뽀모도로 3세션 예정</div>

      <span class="event-chip" style="background:rgba(249,115,22,0.1);color:var(--accent);">🍅 3</span>
    </div>

      <span class="task-title">주간 보고서 제출</span>

    </div>

    <div class="event-item green">
      <span class="event-time">18:00</span>
      <div class="event-info">
        <div class="event-title">운동</div>
        <div class="event-subtitle">💪 30분 · 건강</div>
      </div>
    </div>

    <div class="task-item">
      <div class="task-check done"></div>
      <span class="task-title" style="text-decoration:line-through;color:var(--text-muted);">이메일 정리</span>
    </div>
  </div>
</div>

<div class="bottom-spacer"></div>

<!-- FAB -->
<button class="fab">+</button>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item active">
    <span class="tab-icon">📅</span>
    <span>캘린더</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">🍅</span>
    <span>집중</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">☑️</span>
    <span>할 일</span>
    <span class="tab-badge"></span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">📊</span>
    <span>관리</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">⚙️</span>
    <span>설정</span>
  </div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.textContent = '🌙';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  }
}
</script>
</body>
</html>
