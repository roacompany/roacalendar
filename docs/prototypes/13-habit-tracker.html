<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로아 캘린더 — 습관 트래커</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB;
    --accent: #F97316;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --text: #1C1C1A;
    --text-secondary: #525250;
    --text-muted: #A3A3A0;
    --border: #E5E5E0;
    --border-light: #F5F5F3;
    --success: #22C55E;
    --error: #EF4444;
    --info: #3B82F6;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --font: 'Pretendard Variable', -apple-system, system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #191F28; --surface: #242B35; --text: #F5F5F3;
    --text-secondary: #A3A3A0; --text-muted: #737370;
    --border: #333B48; --border-light: #2A3140;
    --heatmap-empty: #2A3140;
    --heatmap-1: #0E3A1F;
    --heatmap-2: #165E32;
    --heatmap-3: #1A8C47;
    --heatmap-4: #22C55E;
  }
  :root {
    --heatmap-empty: #EBEDF0;
    --heatmap-1: #9BE9A8;
    --heatmap-2: #40C463;
    --heatmap-3: #30A14E;
    --heatmap-4: #216E39;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    width: 375px; margin: 0 auto; min-height: 812px;
    display: flex; flex-direction: column;
    transition: background 0.2s, color 0.2s;
  }
  .theme-toggle {
    position: fixed; top: 8px; right: 8px; z-index: 100;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 14px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }

  /* Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px 4px; font-size: 12px; font-weight: 600;
  }

  /* Header */
  .header {
    padding: 6px 16px 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header-left { display: flex; flex-direction: column; gap: 1px; }
  .header-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .header-date { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .header-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }

  /* Scroll area */
  .scroll-area {
    flex: 1; overflow-y: auto; padding: 0 16px;
    display: flex; flex-direction: column; gap: 12px;
    padding-bottom: 90px;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* Section title */
  .section-title {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 8px;
  }

  /* Habit checklist */
  .habit-list {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .habit-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer; transition: background 0.15s;
  }
  .habit-item:last-child { border-bottom: none; }
  .habit-item:active { background: var(--border-light); }
  .habit-emoji { font-size: 22px; flex-shrink: 0; }
  .habit-info { flex: 1; }
  .habit-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .habit-streak {
    display: flex; align-items: center; gap: 3px;
    font-size: 11px; font-weight: 700; color: var(--accent);
    margin-top: 2px;
  }
  .habit-check {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .habit-check.done {
    background: var(--success); border-color: var(--success);
    box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
  }
  .habit-check.done::after {
    content: '✓'; font-size: 14px; font-weight: 800; color: white;
  }

  /* Yearly Heatmap */
  .heatmap-card {
    background: var(--surface); border-radius: var(--radius-md);
    padding: 14px 14px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
  }
  .heatmap-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .heatmap-months {
    display: flex; gap: 0; margin-bottom: 4px; padding-left: 14px;
  }
  .heatmap-month {
    font-size: 9px; color: var(--text-muted); font-weight: 600;
    flex-shrink: 0;
  }
  .heatmap-body {
    display: flex; gap: 2px;
  }
  .heatmap-days-label {
    display: flex; flex-direction: column; gap: 2px; margin-right: 4px;
  }
  .heatmap-day-label {
    font-size: 8px; color: var(--text-muted); height: 9px;
    display: flex; align-items: center; font-weight: 600;
  }
  .heatmap-grid {
    display: flex; gap: 2px; overflow: hidden;
  }
  .heatmap-col {
    display: flex; flex-direction: column; gap: 2px;
  }
  .heatmap-cell {
    width: 9px; height: 9px; border-radius: 2px;
    background: var(--heatmap-empty);
    transition: background 0.2s;
  }
  .heatmap-cell.l1 { background: var(--heatmap-1); }
  .heatmap-cell.l2 { background: var(--heatmap-2); }
  .heatmap-cell.l3 { background: var(--heatmap-3); }
  .heatmap-cell.l4 { background: var(--heatmap-4); }
  .heatmap-cell.current { outline: 2px solid var(--primary); outline-offset: 0; }
  .heatmap-legend {
    display: flex; align-items: center; gap: 4px;
    margin-top: 8px; justify-content: flex-end;
  }
  .heatmap-legend-label {
    font-size: 9px; color: var(--text-muted);
  }
  .heatmap-legend-cell {
    width: 9px; height: 9px; border-radius: 2px;
  }

  /* Correlation card */
  .corr-card {
    background: var(--surface); border-radius: var(--radius-md);
    padding: 14px 16px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
  }
  .corr-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 12px;
  }
  .corr-insight {
    font-size: 13px; font-weight: 500; color: var(--text);
    line-height: 1.5; flex: 1;
  }
  .corr-chart {
    display: flex; flex-direction: column; gap: 8px;
  }
  .corr-row {
    display: flex; align-items: center; gap: 10px;
  }
  .corr-label {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    min-width: 64px;
  }
  .corr-bar-bg {
    flex: 1; height: 16px; background: var(--border-light);
    border-radius: var(--radius-full); overflow: hidden;
  }
  .corr-bar-fill {
    height: 100%; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 6px;
  }
  .corr-bar-val {
    font-size: 10px; font-weight: 800; color: white;
  }

  /* Add habit button */
  .add-habit-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px;
    background: var(--surface); border-radius: var(--radius-md);
    border: 2px dashed var(--border);
    font-size: 14px; font-weight: 600; color: var(--primary);
    cursor: pointer; transition: all 0.15s;
  }
  .add-habit-btn:active { opacity: 0.7; }

  /* Tab Bar */
  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 375px;
    display: flex; justify-content: space-around; align-items: center;
    padding: 6px 0 20px;
    background: var(--surface);
    border-top: 1px solid var(--border-light);
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10px; font-weight: 500; color: var(--text-muted);
    cursor: pointer; padding: 4px 8px;
    transition: color 0.2s; position: relative;
  }
  .tab-item.active { color: var(--primary); }
  .tab-icon { font-size: 22px; }
</style>
</head>
<body data-theme="dark">
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>

<!-- Status Bar -->
<div class="status-bar">
  <span>9:41</span>
  <span style="font-size:10px;">●●●&nbsp;&nbsp;📶&nbsp;&nbsp;🔋</span>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="header-title">습관</span>
    <span class="header-date">오늘 · 3월 26일 수요일</span>
  </div>
  <button class="header-btn">📋</button>
</div>

<!-- Scroll area -->
<div class="scroll-area">

  <!-- Today's habits -->
  <div>
    <div class="section-title">오늘의 습관 <span style="font-size:12px;color:var(--text-muted);font-weight:500;">2/5 완료</span></div>
    <div class="habit-list">
      <!-- Done -->
      <div class="habit-item" onclick="toggleHabit(this)">
        <span class="habit-emoji">💪</span>
        <div class="habit-info">
          <div class="habit-name">운동 30분</div>
          <div class="habit-streak">🔥 12일 연속</div>
        </div>
        <div class="habit-check done"></div>
      </div>
      <!-- Done -->
      <div class="habit-item" onclick="toggleHabit(this)">
        <span class="habit-emoji">📚</span>
        <div class="habit-info">
          <div class="habit-name">독서 20분</div>
          <div class="habit-streak">🔥 5일 연속</div>
        </div>
        <div class="habit-check done"></div>
      </div>
      <!-- Not done -->
      <div class="habit-item" onclick="toggleHabit(this)">
        <span class="habit-emoji">🧘</span>
        <div class="habit-info">
          <div class="habit-name">명상 10분</div>
          <div class="habit-streak" style="color:var(--text-muted);">3일 연속</div>
        </div>
        <div class="habit-check"></div>
      </div>
      <!-- Not done -->
      <div class="habit-item" onclick="toggleHabit(this)">
        <span class="habit-emoji">💧</span>
        <div class="habit-info">
          <div class="habit-name">물 8잔</div>
          <div class="habit-streak" style="color:var(--text-muted);">1일 연속</div>
        </div>
        <div class="habit-check"></div>
      </div>
      <!-- Not done -->
      <div class="habit-item" onclick="toggleHabit(this)">
        <span class="habit-emoji">📝</span>
        <div class="habit-info">
          <div class="habit-name">일기 쓰기</div>
          <div class="habit-streak" style="color:var(--text-muted);">어제 완료</div>
        </div>
        <div class="habit-check"></div>
      </div>
    </div>
  </div>

  <!-- Yearly Heatmap -->
  <div class="heatmap-card">
    <div class="heatmap-header">
      <span class="section-title" style="margin-bottom:0;">연간 달성 현황</span>
      <span style="font-size:11px;color:var(--success);font-weight:700;">올해 187일 🔥</span>
    </div>
    <div class="heatmap-months" id="heatmapMonths"></div>
    <div class="heatmap-body">
      <div class="heatmap-days-label">
        <div class="heatmap-day-label" style="height:11px;"></div>
        <div class="heatmap-day-label">월</div>
        <div class="heatmap-day-label"></div>
        <div class="heatmap-day-label">수</div>
        <div class="heatmap-day-label"></div>
        <div class="heatmap-day-label">금</div>
        <div class="heatmap-day-label"></div>
      </div>
      <div class="heatmap-grid" id="heatmapGrid"></div>
    </div>
    <div class="heatmap-legend">
      <span class="heatmap-legend-label">없음</span>
      <div class="heatmap-legend-cell" style="background:var(--heatmap-empty);"></div>
      <div class="heatmap-legend-cell" style="background:var(--heatmap-1);"></div>
      <div class="heatmap-legend-cell" style="background:var(--heatmap-2);"></div>
      <div class="heatmap-legend-cell" style="background:var(--heatmap-3);"></div>
      <div class="heatmap-legend-cell" style="background:var(--heatmap-4);"></div>
      <span class="heatmap-legend-label">많음</span>
    </div>
  </div>

  <!-- Habit-Energy Correlation -->
  <div class="corr-card">
    <div style="margin-bottom:10px;">
      <div class="section-title" style="margin-bottom:4px;">💪 운동 × 에너지 상관관계</div>
      <div style="font-size:12px;color:var(--success);font-weight:600;">운동한 날 에너지가 평균 50% 높습니다</div>
    </div>
    <div class="corr-chart">
      <div class="corr-row">
        <span class="corr-label">운동한 날</span>
        <div class="corr-bar-bg">
          <div class="corr-bar-fill" style="width:84%;background:var(--success);">
            <span class="corr-bar-val">4.2</span>
          </div>
        </div>
      </div>
      <div class="corr-row">
        <span class="corr-label">운동 안 한 날</span>
        <div class="corr-bar-bg">
          <div class="corr-bar-fill" style="width:56%;background:var(--text-muted);">
            <span class="corr-bar-val">2.8</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add habit -->
  <button class="add-habit-btn">
    <span style="font-size:20px;">+</span>
    습관 추가
  </button>

</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item">
    <span class="tab-icon">📅</span>
    <span>캘린더</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">🍅</span>
    <span>집중</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">☑️</span>
    <span>할 일</span>
  </div>
  <div class="tab-item active">
    <span class="tab-icon">📊</span>
    <span>관리</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">⚙️</span>
    <span>설정</span>
  </div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.textContent = '🌙';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  }
}

function toggleHabit(item) {
  const check = item.querySelector('.habit-check');
  check.classList.toggle('done');
}

// Build heatmap — 52 weeks × 7 days
// Seed a pseudo-random pattern with more activity in recent weeks
function pseudoRandom(seed) {
  let x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

const grid = document.getElementById('heatmapGrid');
const totalWeeks = 52;
// Current week = week 12 (0-indexed: 11), day = Thursday (index 3)
const currentWeekIdx = 11;
const currentDayIdx = 3; // Wed = index 2 (Mon=0)

const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
// Month starts at which week column (approximate)
const monthStarts = [0, 4, 8, 13, 17, 22, 26, 30, 35, 39, 43, 48];

// Render month labels
const monthsEl = document.getElementById('heatmapMonths');
// We'll build the month labels dynamically based on container width
// Each cell is 9px + 2px gap = 11px per week
months.forEach((m, i) => {
  const span = document.createElement('span');
  span.className = 'heatmap-month';
  span.textContent = m;
  // Position: monthStarts[i] * 11px
  const leftPx = monthStarts[i] * 11;
  span.style.marginLeft = i === 0 ? '0' : ((monthStarts[i] - monthStarts[i-1]) * 11 - (i > 0 ? span.offsetWidth : 0)) + 'px';
  // Simpler approach: fixed widths
  span.style.width = ((i < months.length - 1 ? monthStarts[i+1] : totalWeeks) - monthStarts[i]) * 11 + 'px';
  monthsEl.appendChild(span);
});

for (let w = 0; w < totalWeeks; w++) {
  const col = document.createElement('div');
  col.className = 'heatmap-col';
  for (let d = 0; d < 7; d++) {
    const cell = document.createElement('div');
    cell.className = 'heatmap-cell';
    // Future cells = empty
    const isFuture = (w > currentWeekIdx) || (w === currentWeekIdx && d > currentDayIdx);
    if (!isFuture) {
      const r = pseudoRandom(w * 7 + d);
      // More activity in recent weeks
      const recencyBoost = w > 8 ? 0.15 : 0;
      if (r + recencyBoost > 0.55) {
        const level = r + recencyBoost > 0.85 ? 'l4' : r + recencyBoost > 0.72 ? 'l3' : r + recencyBoost > 0.62 ? 'l2' : 'l1';
        cell.classList.add(level);
      }
    }
    if (w === currentWeekIdx && d === currentDayIdx) {
      cell.classList.add('current');
      if (!cell.classList.contains('l1') && !cell.classList.contains('l2') && !cell.classList.contains('l3') && !cell.classList.contains('l4')) {
        cell.classList.add('l4');
      }
    }
    col.appendChild(cell);
  }
  grid.appendChild(col);
}
</script>
</body>
</html>
