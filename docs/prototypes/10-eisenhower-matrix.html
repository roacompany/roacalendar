<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로아 캘린더 — 아이젠하워 매트릭스</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB;
    --accent: #F97316;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --text: #1C1C1A;
    --text-secondary: #525250;
    --text-muted: #A3A3A0;
    --border: #E5E5E0;
    --border-light: #F5F5F3;
    --success: #22C55E;
    --error: #EF4444;
    --info: #3B82F6;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --font: 'Pretendard Variable', -apple-system, system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #191F28; --surface: #242B35; --text: #F5F5F3;
    --text-secondary: #A3A3A0; --text-muted: #737370;
    --border: #333B48; --border-light: #2A3140;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    width: 375px; margin: 0 auto; height: 812px;
    display: flex; flex-direction: column;
    transition: background 0.2s, color 0.2s;
    overflow: hidden;
  }
  .theme-toggle {
    position: fixed; top: 8px; right: 8px; z-index: 100;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 14px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }

  /* Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px 4px; font-size: 12px; font-weight: 600;
    flex-shrink: 0;
  }

  /* Header */
  .header {
    padding: 6px 16px 8px;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .header-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }

  /* Axis labels */
  .axis-row {
    display: flex; align-items: center; padding: 0 12px 4px;
    flex-shrink: 0;
  }
  .axis-center { flex: 1; display: flex; justify-content: center; gap: 0; }
  .axis-label {
    font-size: 10px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .axis-divider {
    font-size: 10px; color: var(--text-muted); margin: 0 6px;
  }
  .axis-side-label {
    font-size: 10px; font-weight: 700; color: var(--text-muted);
    writing-mode: vertical-rl; text-orientation: mixed;
    letter-spacing: 0.5px; width: 14px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Matrix layout */
  .matrix-wrapper {
    flex: 1; display: flex; padding: 0 8px 4px; gap: 0;
    min-height: 0;
  }
  .matrix-side {
    width: 14px; display: flex; flex-direction: column; gap: 6px;
    justify-content: center;
  }
  .side-label-top {
    flex: 1; display: flex; align-items: center; justify-content: center;
  }
  .side-label-bottom {
    flex: 1; display: flex; align-items: center; justify-content: center;
  }
  .side-text {
    font-size: 9px; font-weight: 700; color: var(--text-muted);
    writing-mode: vertical-rl; transform: rotate(180deg);
    letter-spacing: 0.8px; text-transform: uppercase;
  }
  .matrix-grid {
    flex: 1; display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 6px;
  }

  /* Quadrant */
  .quadrant {
    background: var(--surface);
    border-radius: var(--radius-md);
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-light);
  }
  .q-header {
    padding: 7px 10px 5px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .q-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.3px;
    text-transform: uppercase; opacity: 0.9;
  }
  .q-title {
    font-size: 12px; font-weight: 800; color: white;
    margin-top: 1px;
  }
  .q-count {
    font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.6);
    line-height: 1;
  }

  /* Q1 - red */
  .q1 .q-header { background: linear-gradient(135deg, #EF4444, #DC2626); }
  /* Q2 - blue */
  .q2 .q-header { background: linear-gradient(135deg, #2563EB, #1D4ED8); }
  /* Q3 - orange */
  .q3 .q-header { background: linear-gradient(135deg, #F97316, #EA580C); }
  /* Q4 - gray */
  .q4 .q-header { background: linear-gradient(135deg, #737370, #525250); }

  .q-tasks {
    flex: 1; padding: 6px 8px; display: flex; flex-direction: column;
    gap: 4px; overflow: hidden;
  }
  .q-task {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 6px;
    border-radius: var(--radius-sm);
    background: var(--border-light);
    transition: background 0.15s;
  }
  .q-task:active { background: var(--border); }
  .q-checkbox {
    width: 16px; height: 16px; min-width: 16px;
    border-radius: 4px; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  /* Q1 checkbox color */
  .q1 .q-checkbox { border-color: rgba(239,68,68,0.4); }
  .q2 .q-checkbox { border-color: rgba(37,99,235,0.4); }
  .q3 .q-checkbox { border-color: rgba(249,115,22,0.4); }
  .q4 .q-checkbox { border-color: var(--border); }

  .q-task-text {
    font-size: 11px; font-weight: 500; color: var(--text);
    line-height: 1.3;
  }

  /* Center divider intersection */
  .matrix-center-h {
    height: 1px; background: var(--border); margin: 0 8px;
    flex-shrink: 0;
  }

  /* Bottom axis labels */
  .axis-bottom {
    display: flex; padding: 3px 22px 6px;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .axis-bottom-label {
    font-size: 9px; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  /* Tab Bar */
  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 375px;
    display: flex; justify-content: space-around; align-items: center;
    padding: 6px 0 20px;
    background: var(--surface);
    border-top: 1px solid var(--border-light);
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10px; font-weight: 500; color: var(--text-muted);
    cursor: pointer; padding: 4px 8px;
    transition: color 0.2s; position: relative;
  }
  .tab-item.active { color: var(--primary); }
  .tab-icon { font-size: 22px; }
  .tab-badge {
    position: absolute; top: -2px; right: -4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--error);
  }

  .bottom-spacer { height: 68px; flex-shrink: 0; }
</style>
</head>
<body data-theme="dark">
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>

<!-- Status Bar -->
<div class="status-bar">
  <span>9:41</span>
  <span style="font-size:10px;">●●●&nbsp;&nbsp;📶&nbsp;&nbsp;🔋</span>
</div>

<!-- Header -->
<div class="header">
  <span class="header-title">아이젠하워 매트릭스</span>
  <button class="header-btn">✏️</button>
</div>

<!-- Horizontal axis label (top) -->
<div class="axis-row">
  <div style="width:14px;"></div>
  <div class="axis-center">
    <span class="axis-label" style="color:#EF4444;">긴급</span>
    <span class="axis-divider">↔</span>
    <span class="axis-label">긴급하지 않음</span>
  </div>
</div>

<!-- Matrix -->
<div class="matrix-wrapper">
  <!-- Side labels -->
  <div class="matrix-side">
    <div class="side-label-top">
      <span class="side-text" style="color:#2563EB;">중요</span>
    </div>
    <div class="side-label-bottom">
      <span class="side-text">중요하지 않음</span>
    </div>
  </div>

  <div class="matrix-grid">
    <!-- Q1: Urgent + Important -->
    <div class="quadrant q1">
      <div class="q-header">
        <div>
          <div class="q-label" style="color:rgba(255,255,255,0.7);">Q1 · 즉시 실행</div>
          <div class="q-title">Do Now</div>
        </div>
        <div class="q-count">2</div>
      </div>
      <div class="q-tasks">
        <div class="q-task">
          <div class="q-checkbox"></div>
          <span class="q-task-text">기획안 최종 제출</span>
        </div>
        <div class="q-task">
          <div class="q-checkbox"></div>
          <span class="q-task-text">서버 장애 대응</span>
        </div>
      </div>
    </div>

    <!-- Q2: Not Urgent + Important -->
    <div class="quadrant q2">
      <div class="q-header">
        <div>
          <div class="q-label" style="color:rgba(255,255,255,0.7);">Q2 · 일정 잡기</div>
          <div class="q-title">Schedule</div>
        </div>
        <div class="q-count">3</div>
      </div>
      <div class="q-tasks">
        <div class="q-task">
          <div class="q-checkbox"></div>
          <span class="q-task-text">주간 보고서 작성</span>
        </div>
        <div class="q-task">
          <div class="q-checkbox"></div>
          <span class="q-task-text">운동 루틴</span>
        </div>
        <div class="q-task">
          <div class="q-checkbox"></div>
          <span class="q-task-text">독서</span>
        </div>
      </div>
    </div>

    <!-- Q3: Urgent + Not Important -->
    <div class="quadrant q3">
      <div class="q-header">
        <div>
          <div class="q-label" style="color:rgba(255,255,255,0.7);">Q3 · 위임</div>
          <div class="q-title">Delegate</div>
        </div>
        <div class="q-count">2</div>
      </div>
      <div class="q-tasks">
        <div class="q-task">
          <div class="q-checkbox"></div>
          <span class="q-task-text">이메일 정리</span>
        </div>
        <div class="q-task">
          <div class="q-checkbox"></div>
          <span class="q-task-text">회의 자료 복사</span>
        </div>
      </div>
    </div>

    <!-- Q4: Not Urgent + Not Important -->
    <div class="quadrant q4">
      <div class="q-header">
        <div>
          <div class="q-label" style="color:rgba(255,255,255,0.7);">Q4 · 제거</div>
          <div class="q-title">Eliminate</div>
        </div>
        <div class="q-count">1</div>
      </div>
      <div class="q-tasks">
        <div class="q-task">
          <div class="q-checkbox"></div>
          <span class="q-task-text">SNS 확인</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom axis -->
<div class="axis-bottom">
  <span class="axis-bottom-label" style="color:#EF4444;">← 긴급</span>
  <span class="axis-bottom-label">긴급하지 않음 →</span>
</div>

<div class="bottom-spacer"></div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item">
    <span class="tab-icon">📅</span>
    <span>캘린더</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">🍅</span>
    <span>집중</span>
  </div>
  <div class="tab-item active">
    <span class="tab-icon">☑️</span>
    <span>할 일</span>
    <span class="tab-badge"></span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">📊</span>
    <span>관리</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">⚙️</span>
    <span>설정</span>
  </div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.textContent = '🌙';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  }
}
</script>
</body>
</html>
