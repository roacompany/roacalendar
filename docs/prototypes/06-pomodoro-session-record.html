<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로아 캘린더 — 뽀모도로 세션 기록</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB;
    --accent: #F97316;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --text: #1C1C1A;
    --text-secondary: #525250;
    --text-muted: #A3A3A0;
    --border: #E5E5E0;
    --border-light: #F5F5F3;
    --success: #22C55E;
    --error: #EF4444;
    --info: #3B82F6;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --font: 'Pretendard Variable', -apple-system, system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #191F28; --surface: #242B35; --text: #F5F5F3;
    --text-secondary: #A3A3A0; --text-muted: #737370;
    --border: #333B48; --border-light: #2A3140;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    width: 375px; margin: 0 auto; min-height: 812px;
    display: flex; flex-direction: column;
    transition: background 0.2s, color 0.2s;
  }
  .theme-toggle {
    position: fixed; top: 8px; right: 8px; z-index: 100;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 14px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }

  /* Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px 4px; font-size: 12px; font-weight: 600;
  }

  /* Header */
  .header {
    padding: 8px 16px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .header-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }

  /* Scroll content */
  .scroll-content {
    flex: 1; overflow-y: auto; padding: 0 16px;
    padding-bottom: 88px;
  }

  /* Section label */
  .section-label {
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px; margin-top: 4px;
  }

  /* Input */
  .input-field {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 13px 14px; font-size: 15px; font-family: var(--font);
    color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .input-field:focus { border-color: var(--primary); }
  .input-field::placeholder { color: var(--text-muted); }
  [data-theme="dark"] .input-field { background: var(--surface); }

  /* Todo picker button */
  .todo-picker-btn {
    width: 100%; background: var(--surface);
    border: 1px dashed var(--border); border-radius: var(--radius-md);
    padding: 12px 14px; font-size: 14px; font-family: var(--font);
    color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px;
  }
  .todo-picker-btn .icon { font-size: 16px; }

  /* Preset chips */
  .preset-row {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
  }
  .preset-chip {
    padding: 6px 12px; border-radius: var(--radius-full);
    font-size: 12px; font-weight: 600; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .preset-chip.active {
    background: rgba(37,99,235,0.1); border-color: var(--primary);
    color: var(--primary);
  }
  .preset-chip .time-hint {
    font-size: 10px; font-weight: 500; color: var(--text-muted);
  }
  .preset-chip.active .time-hint { color: rgba(37,99,235,0.6); }

  /* Start button */
  .start-btn {
    width: 100%; padding: 16px; border-radius: var(--radius-lg);
    background: var(--primary); color: white;
    font-size: 17px; font-weight: 700; font-family: var(--font);
    border: none; cursor: pointer; margin-top: 16px;
    letter-spacing: -0.3px;
    box-shadow: 0 4px 16px rgba(37,99,235,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .start-btn:active { transform: scale(0.97); }

  /* Divider with label */
  .divider-label {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border-light); }
  .divider-text {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.3px; white-space: nowrap;
  }

  /* Post-session summary card */
  .summary-card {
    background: var(--surface); border-radius: var(--radius-lg);
    padding: 16px; border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm); margin-bottom: 10px;
  }
  .summary-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .summary-title {
    font-size: 17px; font-weight: 700;
  }
  .summary-time-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .time-chip {
    padding: 4px 10px; border-radius: var(--radius-full);
    font-size: 12px; font-weight: 600;
  }
  .time-chip.planned {
    background: rgba(37,99,235,0.1); color: var(--primary);
  }
  .time-chip.actual {
    background: rgba(249,115,22,0.1); color: var(--accent);
  }

  /* Connected todo */
  .connected-todo {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border-light); padding: 12px 14px;
    margin-top: 8px; display: flex; align-items: center; gap: 10px;
  }
  .todo-icon { font-size: 14px; }
  .todo-info { flex: 1; }
  .todo-name { font-size: 14px; font-weight: 600; }
  .todo-progress { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .progress-bar-wrap {
    height: 4px; background: var(--border-light);
    border-radius: 2px; margin-top: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 2px; background: var(--primary);
    transition: width 0.4s;
  }

  /* Button row */
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-primary {
    flex: 1; padding: 14px; border-radius: var(--radius-md);
    background: var(--primary); color: white;
    font-size: 15px; font-weight: 700; font-family: var(--font);
    border: none; cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost {
    flex: 0 0 auto; padding: 14px 20px; border-radius: var(--radius-md);
    background: transparent; color: var(--text-secondary);
    font-size: 15px; font-weight: 600; font-family: var(--font);
    border: 1.5px solid var(--border); cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-ghost:active { border-color: var(--text-muted); }

  /* Tab Bar */
  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 375px;
    display: flex; justify-content: space-around; align-items: center;
    padding: 6px 0 20px;
    background: var(--surface);
    border-top: 1px solid var(--border-light);
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10px; font-weight: 500; color: var(--text-muted);
    cursor: pointer; padding: 4px 8px;
    transition: color 0.2s; position: relative;
  }
  .tab-item.active { color: var(--primary); }
  .tab-icon { font-size: 22px; }
  .tab-badge {
    position: absolute; top: -2px; right: -4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--error);
  }
</style>
</head>
<body data-theme="dark">
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>

<!-- Status Bar -->
<div class="status-bar">
  <span>9:41</span>
  <span style="font-size:10px;">●●●&nbsp;&nbsp;📶&nbsp;&nbsp;🔋</span>
</div>

<!-- Header -->
<div class="header">
  <span class="header-title">세션 준비</span>
  <button class="header-btn">⚙️</button>
</div>

<!-- Scroll Content -->
<div class="scroll-content">

  <!-- Pre-session -->
  <div class="section-label">무엇에 집중할 것인가?</div>
  <input class="input-field" type="text" placeholder="집중할 내용을 입력하세요..." value="기획안 최종 작성">
  <button class="todo-picker-btn">
    <span class="icon">☑️</span>
    <span>할 일에서 선택</span>
    <span style="margin-left:auto;font-size:12px;color:var(--text-muted);">기획안 최종 제출 →</span>
  </button>

  <!-- Preset selector -->
  <div style="margin-top:16px;">
    <div class="section-label">타이머 프리셋</div>
    <div class="preset-row">
      <div class="preset-chip active">
        🍅 클래식
        <span class="time-hint">25/5</span>
      </div>
      <div class="preset-chip">
        ⚡ 숏스프린트
        <span class="time-hint">15/3</span>
      </div>
      <div class="preset-chip">
        🧠 확장집중
        <span class="time-hint">50/10</span>
      </div>
      <div class="preset-chip">
        🔄 52/17
        <span class="time-hint">52/17</span>
      </div>
      <div class="preset-chip">
        🌊 울트라디안
        <span class="time-hint">90/20</span>
      </div>
      <div class="preset-chip">
        ✏️ 커스텀
      </div>
    </div>
  </div>

  <!-- Preset detail info -->
  <div style="background:var(--surface);border-radius:var(--radius-md);padding:12px 14px;margin-top:10px;border:1px solid var(--border-light);">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:13px;font-weight:700;">🍅 클래식 뽀모도로</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">Francesco Cirillo의 원본 기법</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:18px;font-weight:800;color:var(--primary);">25<span style="font-size:12px;font-weight:500;">분</span></div>
        <div style="font-size:11px;color:var(--text-muted);">휴식 5분</div>
      </div>
    </div>
  </div>

  <button class="start-btn">집중 시작 🍅</button>

  <!-- Divider -->
  <div class="divider-label">
    <div class="divider-line"></div>
    <span class="divider-text">세션 완료 후</span>
    <div class="divider-line"></div>
  </div>

  <!-- Post-session summary -->
  <div class="summary-card">
    <div class="summary-header">
      <span class="summary-title">25분 집중 완료 🎉</span>
    </div>
    <div class="summary-time-row">
      <div class="time-chip planned">⏱ 계획 25:00</div>
      <div class="time-chip actual">🔥 실제 27:34 (+2:34)</div>
    </div>
  </div>

  <div class="section-label" style="margin-top:14px;">무엇을 달성했는가?</div>
  <textarea class="input-field" rows="3" style="resize:none;line-height:1.5;" placeholder="이번 세션에서 달성한 내용을 기록하세요...">초안 목차 작성 및 경쟁사 분석 섹션 완료</textarea>

  <!-- Connected todo -->
  <div class="connected-todo">
    <span class="todo-icon">🔗</span>
    <div class="todo-info">
      <div class="todo-name">기획안 최종 제출</div>
      <div class="todo-progress">🍅 2 → 3 세션 완료 · 3/3 목표 달성!</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:100%;background:var(--success);"></div>
      </div>
    </div>
    <span style="font-size:18px;">✅</span>
  </div>

  <!-- Action buttons -->
  <div class="btn-row">
    <button class="btn-primary">저장</button>
    <button class="btn-ghost">건너뛰기</button>
  </div>

  <div style="height:8px;"></div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item">
    <span class="tab-icon">📅</span>
    <span>캘린더</span>
  </div>
  <div class="tab-item active">
    <span class="tab-icon">🍅</span>
    <span>집중</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">☑️</span>
    <span>할 일</span>
    <span class="tab-badge"></span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">📊</span>
    <span>관리</span>
  </div>
  <div class="tab-item">
    <span class="tab-icon">⚙️</span>
    <span>설정</span>
  </div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.textContent = '🌙';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  }
}
</script>
</body>
</html>
