included:
  - RoaCalendar
  - RoaCalendarTests
  - RoaCalendarWidget
  - RoaCalendarShare

excluded:
  - DerivedData
  - build

disabled_rules:
  - trailing_whitespace
  - line_length

opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing

force_unwrapping:
  severity: error

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - i
    - n

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 400
  error: 500

function_body_length:
  warning: 50
  error: 80
